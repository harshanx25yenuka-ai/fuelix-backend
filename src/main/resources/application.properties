spring.application.name=fuelix-backend

# Server
server.port=8080
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/fuelix_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JPA properties to handle duplicates gracefully
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# QR Token Settings
qr.token.expiry.seconds=300
qr.signature.secret=FuelixQRSecretKey2024ForHMACSHA256!

# Redis (for OTP storage)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Notify.lk SMS API
notify.lk.user.id=31438
notify.lk.api.key=WvMf3ENa5U4OSny7tYsa
notify.lk.sender=NotifyDEMO
notify.lk.url=https://app.notify.lk/api/v1/send

# SMS Mock Mode (set to true for testing without SMS)
# sms.mock.enabled=true

# Resend Email API
resend.api.key=re_YUr6uznj_MTFjP2v7ir5NXkxQtBs16mSR
resend.from.email=onboarding@resend.dev
resend.from.name=Fuelix Team

# Test Mode Settings
resend.test.mode=true
resend.test.email=harshan.x26yenuka@gmail.com

# OTP Settings
otp.expiry.minutes=5
otp.length=6

# CORS Settings - Allow both localhost and network
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600